name: Playwright API Tests # Nombre que aparecerá en la pestaña Actions de GitHub
on: # Define los eventos que disparan la ejecución
  push: # Se activa al subir cambios al repositorio
    branches: [ main, master ] # Solo se ejecuta en las ramas principales
  pull_request: # Se activa al proponer cambios mediante un PR
    branches: [ main, master ] # Solo hacia las ramas principales
jobs: # Define la lista de trabajos a realizar
  test: # Identificador del trabajo de pruebas
    timeout-minutes: 60 # Tiempo máximo de espera antes de cancelar el proceso
    runs-on: ubuntu-latest # Utiliza la última versión estable de Ubuntu Linux
    steps: # Pasos secuenciales del flujo de trabajo
    - uses: actions/checkout@v4 # Descarga el código del repositorio en el servidor
    - uses: actions/setup-node@v4 # Configura el entorno de ejecución de Node.js
      with:
        node-version: 20 # Utiliza la versión 20 de Node para compatibilidad total
    - name: Install dependencies # Nombre del paso para instalar librerías
      run: npm install # Ejecuta la instalación de los paquetes del package.json
    - name: Install Playwright Browsers # Nombre del paso para preparar Playwright
      run: npx playwright install --with-deps # Instala binarios y dependencias del sistema necesarias
    - name: Run Playwright tests # Nombre del paso para la ejecución de pruebas
      run: npx playwright test # Ejecuta todos los tests del framework
      env: # Inyección de variables de entorno desde los Secrets del repositorio
        BOOKER_USERNAME: ${{ secrets.BOOKER_USERNAME }} # Mapea el secreto del usuario a la variable de entorno
        BOOKER_PASSWORD: ${{ secrets.BOOKER_PASSWORD }} # Mapea el secreto de la clave a la variable de entorno
    - uses: actions/upload-artifact@v4 # Paso para guardar y publicar el reporte de pruebas
      if: always() # Asegura que se ejecute incluso si los tests fallan para ver el error
      with:
        name: playwright-report # Nombre del archivo comprimido resultante
        path: playwright-report/ # Ruta de la carpeta que contiene el reporte HTML
        retention-days: 30 # El reporte estará disponible para descarga durante 30 días